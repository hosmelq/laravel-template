name: Continuous integration

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}

jobs:
  check-unused-composer-dependencies:
    name: Check unused composer dependencies

    runs-on: ubuntu-latest

    needs: php-dependencies

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Check unused composer dependencies
        uses: hosmelq/.github/.github/actions/composer-unused-dependencies-check@0e629f62b840abf1d0d07479e6efa99567293001
        with:
          artifact-mode: download
          artifact-name: php-vendor
          php-tools: cs2pr
          php-version: '8.5'

  check-composer:
    name: Check composer

    runs-on: ubuntu-latest

    needs: php-dependencies

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Check composer normalize
        uses: hosmelq/.github/.github/actions/composer-normalize-check@0e629f62b840abf1d0d07479e6efa99567293001
        with:
          artifact-mode: download
          artifact-name: php-vendor
          php-tools: cs2pr
          php-version: '8.5'

  check-static-code:
    name: Check static code

    runs-on: ubuntu-latest

    needs: php-dependencies

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Check static code
        uses: hosmelq/.github/.github/actions/phpstan-check@0e629f62b840abf1d0d07479e6efa99567293001
        with:
          artifact-mode: download
          artifact-name: php-vendor
          php-tools: cs2pr
          php-version: '8.5'

  check-code-quality:
    name: Check code quality

    runs-on: ubuntu-latest

    needs: php-dependencies

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Check code quality
        uses: hosmelq/.github/.github/actions/php-rector-check@0e629f62b840abf1d0d07479e6efa99567293001
        with:
          artifact-mode: download
          artifact-name: php-vendor
          php-tools: cs2pr
          php-version: '8.5'

  check-code-style:
    name: Check code style

    runs-on: ubuntu-latest

    needs: php-dependencies

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Check PHP code style
        uses: hosmelq/.github/.github/actions/php-pint-check@0e629f62b840abf1d0d07479e6efa99567293001
        with:
          artifact-mode: download
          artifact-name: php-vendor
          php-tools: cs2pr
          php-version: '8.5'

  php-dependencies:
    name: PHP dependencies

    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Prepare composer dependencies
        uses: hosmelq/.github/.github/actions/composer-dependencies@0e629f62b840abf1d0d07479e6efa99567293001
        with:
          artifact-mode: upload
          artifact-name: php-vendor
          php-tools: ''
          php-version: '8.5'

  tests:
    name: Tests (Shard ${{ matrix.shard }}/4)

    runs-on: ubuntu-latest

    needs:
      - check-code-quality
      - check-code-style
      - check-composer
      - check-static-code
      - check-unused-composer-dependencies
      - php-dependencies

    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]

    services:
      postgres:
        env:
          POSTGRES_DB: template_testing
          POSTGRES_HOST_AUTH_METHOD: trust
        image: postgres:18
        ports:
          - 5432:5432

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Prepare composer dependencies
        uses: hosmelq/.github/.github/actions/composer-dependencies@0e629f62b840abf1d0d07479e6efa99567293001
        with:
          artifact-mode: download
          artifact-name: php-vendor
          php-tools: ''
          php-version: '8.5'

      - name: Setup problem matchers
        run: |
          echo "::add-matcher::${{ runner.tool_cache }}/php.json"
          echo "::add-matcher::${{ runner.tool_cache }}/phpunit.json"

      - name: Setup testing environment
        run: |
          cp .env.testing.example .env.testing
          php artisan key:generate --env=testing

      - name: Run Pest shard
        run: ./vendor/bin/pest --ci --parallel --shard=${{ matrix.shard }}/4
