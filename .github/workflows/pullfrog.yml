# PULLFROG ACTION — DO NOT EDIT EXCEPT WHERE INDICATED
name: Pullfrog

run-name: ${{ inputs.name || github.workflow }}

on:
  workflow_dispatch:
    inputs:
      name:
        type: string
        description: Run name
      prompt:
        type: string
        description: Agent prompt

permissions:
  contents: read

jobs:
  pullfrog:
    runs-on: ubuntu-latest

    services:
      postgres:
        env:
          POSTGRES_DB: template_testing
          POSTGRES_HOST_AUTH_METHOD: trust
        image: postgres:18
        options: >-
          --health-cmd "pg_isready -U postgres -d template_testing"
          --health-interval 10s
          --health-retries 5
          --health-timeout 5s
        ports:
          - 5432:5432

    permissions:
      checks: write
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Setup Nub
        uses: nubjs/setup-nub@47e5e7393d50f4e9544ddaf756aa277972afba2d # v0

      - name: Setup PHP
        uses: hosmelq/.github/.github/actions/php-setup@0e629f62b840abf1d0d07479e6efa99567293001
        with:
          php-tools: ''
          php-version: '8.5'

      - name: Create databases
        run: |
          psql -h 127.0.0.1 -U postgres -d postgres <<'SQL'
          SELECT 'CREATE DATABASE template'
          WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'template')\gexec
          SELECT 'CREATE DATABASE template_testing'
          WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'template_testing')\gexec
          SQL

      - name: Run agent
        uses: pullfrog/pullfrog@v0
        with:
          prompt: ${{ inputs.prompt }}
          status_checks: enabled
