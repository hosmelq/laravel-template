glob_matcher: doublestar

pre-commit:
  parallel: true

  jobs:
    - name: Backend
      group:
        piped: true
        jobs:
          - name: Rector (fix)
            glob: '**/*.php'
            exclude:
              - '**/*.blade.php'
            run: composer rector -- {staged_files}
            stage_fixed: true

          - name: Pint (fix)
            glob: '**/*.php'
            exclude:
              - '**/*.blade.php'
            run: composer pint -- {staged_files}
            stage_fixed: true

          - name: PHPStan
            glob: '**/*.php'
            exclude:
              - '**/*.blade.php'
              - 'tests/**'
            run: composer phpstan -- {staged_files}

pre-push:
  parallel: true

  jobs:
    - name: PHPStan
      run: composer phpstan
