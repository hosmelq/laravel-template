icon: null

name: template

processes:
  'artisan: pail':
    auto_restart: true
    auto_start: true
    command: php artisan pail
  'artisan: queue:work':
    auto_restart: true
    auto_start: true
    command: php artisan queue:work database --timeout=180 --tries=3
  'artisan: schedule:work':
    auto_restart: true
    auto_start: true
    command: php artisan schedule:work --whisper
