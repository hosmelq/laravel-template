icon: null

name: template

processes:
  'artisan: pail':
    auto_restart: true
    auto_start: true
    command: php artisan pail
  'artisan: queue:work':
    auto_restart: true
    auto_start: true
    command: php artisan queue:work database --timeout=180 --tries=3
  'artisan: schedule:work':
    auto_restart: true
    auto_start: true
    command: php artisan schedule:work --whisper
  'nub: build':
    auto_restart: false
    auto_start: false
    command: nub run build
  'nub: dev':
    auto_restart: true
    auto_start: true
    command: nub run dev
